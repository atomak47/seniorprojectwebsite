<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Vintage Sports Vault</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar">
    <a class="navbar-brand" href="index.html">VINTAGE<span>SPORTS</span></a>
  </nav>

  <header class="nba-hero">
    <div class="container text-center">
      <div class="hero-title">CREATE <span>ACCOUNT</span></div>
      <p class="hero-sub">Join Vintage Sports Vault</p>
      <div class="hero-divider"></div>
    </div>
  </header>

  <main class="container" style="max-width: 500px; margin-top: 50px; margin-bottom: 70px;">
    <div class="filters-bar p-4">
      <form id="register-form">
        <div class="mb-3">
          <label for="registerName" class="form-label">Username</label>
          <input type="text" id="registerName" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="registerEmail" class="form-label">Email</label>
          <input type="email" id="registerEmail" class="form-control" required>
        </div>

        <div class="mb-3">
          <label for="registerPassword" class="form-label">Password</label>
          <input type="password" id="registerPassword" class="form-control" required>
        </div>

        <button type="submit" class="btn-add-cart w-100">Create Account</button>

        <div style="margin-top: 14px; text-align: center;">
          <a href="login.html" style="font-size: 14px; text-decoration: none;">
            Already have an account? Login
          </a>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Vintage Sports Vault | All Rights Reserved</p>
  </footer>

  <script>
  const form = document.getElementById("register-form");

  console.log("register page loaded");
  console.log("form found:", !!form);

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    console.log("submit fired");

    const payload = {
      username: document.getElementById("registerName").value.trim(),
      email: document.getElementById("registerEmail").value.trim(),
      password: document.getElementById("registerPassword").value.trim()
    };

    console.log("payload:", payload);

    try {
      const response = await fetch("/api/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      console.log("response status:", response.status);

      const text = await response.text();
      console.log("raw response text:", text);

      let result;
      try {
        result = JSON.parse(text);
      } catch (err) {
        throw new Error("Server did not return JSON. Response was: " + text);
      }

      console.log("parsed result:", result);

      if (!response.ok || !result.success) {
        throw new Error(result.message || "Registration failed.");
      }

      alert("Account created successfully!");
      window.location.href = "login.html";
    } catch (error) {
      console.error("Register error:", error);
      alert("Register error: " + error.message);
    }
  });
</script>

</body>
</html>
