<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard | Vintage Sports Vault</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<script>
  const currentUser = JSON.parse(localStorage.getItem("vsv_current_user"));
  if (!currentUser || currentUser.role !== "admin") {
    window.location.href = "../login.html";
  }
</script>

<nav class="navbar">
  <a class="navbar-brand" href="admin_dashboard.html">VINTAGE<span>SPORTS</span></a>
  <div class="nav-actions d-flex gap-2">
    <a href="../orders.html" class="cart-btn text-decoration-none d-inline-flex align-items-center">User Tracking Page</a>
    <button id="logout-btn" class="cart-btn" type="button">Logout</button>
  </div>
</nav>

<header class="nba-hero">
  <div class="container text-center">
    <div class="hero-title">ADMIN <span>DASHBOARD</span></div>
    <p class="hero-sub">Manage products, inventory, and orders</p>
    <div class="hero-divider"></div>
  </div>
</header>

<main class="container" style="margin-top: 40px; margin-bottom: 70px;">

  <div class="row g-4 admin-stats-row">
    <div class="col-md-4">
      <div class="admin-stat-card">
        <p class="admin-stat-label">Total Products</p>
        <h2 id="total-products" class="admin-stat-value">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="admin-stat-card">
        <p class="admin-stat-label">Low Stock</p>
        <h2 id="low-stock-products" class="admin-stat-value">0</h2>
      </div>
    </div>

    <div class="col-md-4">
      <div class="admin-stat-card">
        <p class="admin-stat-label">Out of Stock</p>
        <h2 id="out-stock-products" class="admin-stat-value">0</h2>
      </div>
    </div>
  </div>

  <div class="admin-section-card">
    <div class="admin-section-header">
      <h2 class="admin-section-title">Add Product</h2>
    </div>

    <form id="add-product-form" class="admin-form-grid">
      <div>
        <label class="admin-label">Name</label>
        <input type="text" id="name" class="form-control" required>
      </div>

      <div>
        <label class="admin-label">Team</label>
        <input type="text" id="team" class="form-control">
      </div>

      <div>
        <label class="admin-label">Category</label>
        <select id="category" class="form-select" required>
          <option value="NBA">NBA</option>
          <option value="Hockey">Hockey</option>
          <option value="Soccer">Soccer</option>
        </select>
      </div>

      <div>
        <label class="admin-label">Type</label>
        <input type="text" id="type" class="form-control" placeholder="Jersey, Hat, PG, SG...">
      </div>

      <div>
        <label class="admin-label">Price</label>
        <input type="number" id="price" class="form-control" step="0.01" required>
      </div>

      <div class="full-width">
        <label class="admin-label">Inventory By Size</label>
        <div class="row g-3">
          <div class="col-6 col-md-3">
            <input type="number" id="stock-s" class="form-control" placeholder="S" value="10" min="0" required>
          </div>
          <div class="col-6 col-md-3">
            <input type="number" id="stock-m" class="form-control" placeholder="M" value="10" min="0" required>
          </div>
          <div class="col-6 col-md-3">
            <input type="number" id="stock-l" class="form-control" placeholder="L" value="10" min="0" required>
          </div>
          <div class="col-6 col-md-3">
            <input type="number" id="stock-xl" class="form-control" placeholder="XL" value="10" min="0" required>
          </div>
        </div>
      </div>

      <div class="full-width">
        <label class="admin-label">Image URL</label>
        <input type="text" id="image" class="form-control">
      </div>

      <div class="full-width">
        <label class="admin-label">Description</label>
        <textarea id="description" class="form-control" rows="3"></textarea>
      </div>

      <div class="full-width">
        <button type="submit" class="btn-add-cart">Add Product</button>
      </div>
    </form>
  </div>

  <div class="admin-section-card">
    <div class="admin-section-header">
      <h2 class="admin-section-title">Inventory</h2>
      <div class="admin-toolbar">
        <div class="admin-search">
          <input type="text" id="search-input" class="form-control" placeholder="Search products...">
        </div>
        <button id="refresh-btn" class="btn-add-cart" type="button">Refresh</button>
      </div>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Type</th>
            <th>Price</th>
            <th>Inventory</th>
            <th>Restock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="inventory-table"></tbody>
      </table>
    </div>
  </div>

  <div class="admin-section-card">
    <div class="admin-section-header">
      <h2 class="admin-section-title">Orders</h2>
      <div class="admin-toolbar">
        <button id="refresh-orders-btn" class="btn-add-cart" type="button">Refresh Orders</button>
      </div>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Total</th>
            <th>Items</th>
            <th>Status</th>
            <th>Update</th>
          </tr>
        </thead>
        <tbody id="orders-table"></tbody>
      </table>
    </div>
  </div>

</main>

<footer>
  <p>&copy; 2026 Vintage Sports Vault</p>
</footer>

<script>
  const API_BASE = "http://localhost:3000";

  let allProducts = [];
  let allOrders = [];

  function getTotalStock(product) {
    const sizes = product?.sizes || {};
    return Number(sizes.S || 0) + Number(sizes.M || 0) + Number(sizes.L || 0) + Number(sizes.XL || 0);
  }

  function getSizesText(product) {
    const sizes = product?.sizes || {};
    return `S:${Number(sizes.S || 0)} | M:${Number(sizes.M || 0)} | L:${Number(sizes.L || 0)} | XL:${Number(sizes.XL || 0)}`;
  }

  function getOrderItemsText(order) {
    const items = Array.isArray(order.items) ? order.items : [];
    if (!items.length) return "No items";

    return items.map(item => {
      const qty = Number(item.quantity || 1);
      const size = item.size || "N/A";
      return `${item.name} (${size}) x${qty}`;
    }).join("<br>");
  }

  async function fetchProducts() {
    const res = await fetch(`${API_BASE}/api/products`);
    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch (err) {
      throw new Error(`Products route returned non-JSON. Status: ${res.status}`);
    }

    if (!res.ok || !data.success) {
      throw new Error(data.message || "Failed to load products.");
    }

    allProducts = data.products || [];
    renderProducts(document.getElementById("search-input").value || "");
  }

  async function fetchOrders() {
    const res = await fetch(`${API_BASE}/api/orders`);
    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch (err) {
      throw new Error(`Orders route returned non-JSON. Status: ${res.status}`);
    }

    if (!res.ok || !data.success) {
      throw new Error(data.message || "Failed to load orders.");
    }

    allOrders = data.orders || [];
    renderOrders();
  }

  function renderProducts(filter = "") {
    const tbody = document.getElementById("inventory-table");

    const filtered = allProducts.filter(product =>
      (product.name || "").toLowerCase().includes(filter.toLowerCase())
    );

    document.getElementById("total-products").textContent = allProducts.length;

    document.getElementById("low-stock-products").textContent =
      allProducts.filter(p => {
        const total = getTotalStock(p);
        return total > 0 && total <= 5;
      }).length;

    document.getElementById("out-stock-products").textContent =
      allProducts.filter(p => getTotalStock(p) === 0).length;

    if (!filtered.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="7" class="admin-empty-state">No products found.</td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = filtered.map(product => {
      const totalStock = getTotalStock(product);

      const stockClass =
        totalStock === 0 ? "admin-stock-badge out" :
        totalStock <= 5 ? "admin-stock-badge low" :
        "admin-stock-badge";

      return `
        <tr>
          <td>
            <div class="admin-product-cell">
              <img
                src="${product.image || 'https://via.placeholder.com/60'}"
                alt="${product.name}"
                class="admin-product-thumb"
              >
              <div>
                <p class="admin-product-name">${product.name}</p>
                <p class="admin-product-meta">${product.team || "N/A"}</p>
              </div>
            </div>
          </td>
          <td><span class="admin-category-badge">${product.category}</span></td>
          <td>${product.type || "N/A"}</td>
          <td><span class="admin-price">$${Number(product.price || 0).toFixed(2)}</span></td>
          <td>
            <div>
              <span class="${stockClass}">${totalStock}</span>
              <div style="font-size:12px; margin-top:6px;">${getSizesText(product)}</div>
            </div>
          </td>
          <td>
            <div class="d-grid gap-2">
              <div class="d-flex gap-2">
                <select id="size-${product._id}" class="form-select form-select-sm">
                  <option value="S">S</option>
                  <option value="M">M</option>
                  <option value="L">L</option>
                  <option value="XL">XL</option>
                </select>
                <input
                  id="qty-${product._id}"
                  type="number"
                  min="1"
                  value="1"
                  class="form-control form-control-sm"
                  placeholder="Qty"
                >
              </div>
              <button class="btn-add-cart btn-sm" onclick="restockProduct('${product._id}')">
                Add Stock
              </button>
            </div>
          </td>
          <td>
            <div class="admin-actions">
              <button class="admin-btn-sm danger" onclick="deleteProduct('${product._id}')">Delete</button>
            </div>
          </td>
        </tr>
      `;
    }).join("");
  }

  function renderOrders() {
    const tbody = document.getElementById("orders-table");

    if (!allOrders.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="6" class="admin-empty-state">No orders found.</td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = allOrders.map(order => `
      <tr>
        <td>${order.orderNumber || order._id}</td>
        <td>
          <strong>${order.name || "N/A"}</strong><br>
          <span style="font-size:12px;">${order.email || "No email"}</span>
        </td>
        <td>$${Number(order.total || 0).toFixed(2)}</td>
        <td style="font-size:12px;">${getOrderItemsText(order)}</td>
        <td>
          <span class="admin-stock-badge">${order.status || "Pending"}</span>
        </td>
        <td>
          <div class="d-flex gap-2">
            <select id="status-${order._id}" class="form-select form-select-sm">
              <option value="Pending" ${order.status === "Pending" ? "selected" : ""}>Pending</option>
              <option value="Processing" ${order.status === "Processing" ? "selected" : ""}>Processing</option>
              <option value="Shipped" ${order.status === "Shipped" ? "selected" : ""}>Shipped</option>
              <option value="Delivered" ${order.status === "Delivered" ? "selected" : ""}>Delivered</option>
              <option value="Cancelled" ${order.status === "Cancelled" ? "selected" : ""}>Cancelled</option>
            </select>
            <button class="btn-add-cart btn-sm" onclick="updateOrderStatus('${order._id}')">Save</button>
          </div>
        </td>
      </tr>
    `).join("");
  }

  async function restockProduct(id) {
    const sizeEl = document.getElementById(`size-${id}`);
    const qtyEl = document.getElementById(`qty-${id}`);

    if (!sizeEl || !qtyEl) {
      alert("Restock inputs not found for this product.");
      return;
    }

    const size = sizeEl.value;
    const quantity = Number(qtyEl.value);

    if (!quantity || quantity < 1) {
      alert("Enter a valid quantity.");
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/api/products/${id}/restock`, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ size, quantity })
      });

      const text = await res.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch (parseError) {
        alert(`Restock route returned non-JSON response. Status: ${res.status}`);
        return;
      }

      if (!res.ok || !data.success) {
        alert(data.message || "Failed to restock product.");
        return;
      }

      alert("Stock updated successfully.");
      await fetchProducts();
    } catch (error) {
      console.error("Restock fetch error:", error);
      alert("Restock request failed before reaching JSON response.");
    }
  }

  async function updateOrderStatus(orderId) {
    const status = document.getElementById(`status-${orderId}`).value;

    try {
      const res = await fetch(`${API_BASE}/api/orders/${orderId}/status`, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ status })
      });

      const text = await res.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch (err) {
        alert(`Order status route returned non-JSON response. Status: ${res.status}`);
        return;
      }

      if (!res.ok || !data.success) {
        alert(data.message || "Failed to update order status.");
        return;
      }

      alert("Order status updated.");
      await fetchOrders();
    } catch (error) {
      console.error("Order status update error:", error);
      alert("Could not update order status.");
    }
  }

  async function deleteProduct(id) {
    if (!confirm("Delete this product?")) return;

    try {
      const res = await fetch(`${API_BASE}/api/products/${id}`, {
        method: "DELETE"
      });

      const text = await res.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch (err) {
        alert(`Delete route returned non-JSON response. Status: ${res.status}`);
        return;
      }

      if (!res.ok || !data.success) {
        alert(data.message || "Delete failed.");
        return;
      }

      await fetchProducts();
    } catch (error) {
      console.error("Delete error:", error);
      alert("Could not delete product.");
    }
  }

  document.getElementById("add-product-form").addEventListener("submit", async function (e) {
    e.preventDefault();

    const payload = {
      name: document.getElementById("name").value.trim(),
      team: document.getElementById("team").value.trim(),
      category: document.getElementById("category").value,
      type: document.getElementById("type").value.trim(),
      price: Number(document.getElementById("price").value),
      image: document.getElementById("image").value.trim(),
      description: document.getElementById("description").value.trim(),
      sizes: {
        S: Number(document.getElementById("stock-s").value),
        M: Number(document.getElementById("stock-m").value),
        L: Number(document.getElementById("stock-l").value),
        XL: Number(document.getElementById("stock-xl").value)
      }
    };

    try {
      const res = await fetch(`${API_BASE}/api/products`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch (err) {
        alert(`Add product route returned non-JSON response. Status: ${res.status}`);
        return;
      }

      if (!res.ok || !data.success) {
        alert(data.message || "Failed to add product.");
        return;
      }

      this.reset();
      document.getElementById("stock-s").value = 10;
      document.getElementById("stock-m").value = 10;
      document.getElementById("stock-l").value = 10;
      document.getElementById("stock-xl").value = 10;

      await fetchProducts();
    } catch (error) {
      console.error("Add product error:", error);
      alert("Could not add product.");
    }
  });

  document.getElementById("search-input").addEventListener("input", function (e) {
    renderProducts(e.target.value);
  });

  document.getElementById("refresh-btn").addEventListener("click", function () {
    fetchProducts().catch(err => {
      console.error(err);
      alert("Products failed: " + err.message);
    });
  });

  document.getElementById("refresh-orders-btn").addEventListener("click", function () {
    fetchOrders().catch(err => {
      console.error(err);
      alert("Orders failed: " + err.message);
    });
  });

  document.getElementById("logout-btn").addEventListener("click", function () {
    localStorage.removeItem("vsv_current_user");
    window.location.href = "../login.html";
  });

  async function initDashboard() {
    try {
      await fetchProducts();
    } catch (err) {
      console.error("Products error:", err);
      alert("Products failed: " + err.message);
    }

    try {
      await fetchOrders();
    } catch (err) {
      console.error("Orders error:", err);
      alert("Orders failed: " + err.message);
    }
  }

  initDashboard();
</script>

</body>
</html>
