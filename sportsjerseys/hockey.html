<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hockey Jerseys | Vintage Sports Vault</title>

  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a class="navbar-brand" href="../index.html">
    VINTAGE<span>SPORTS</span>
  </a>

  <div class="d-flex align-items-center gap-3" style="margin-left:auto;">
    <button id="login-btn" class="cart-btn" onclick="window.location.href='login.html'">
    <span>👤 Login</span>
    </button>

    <button class="cart-btn" onclick="window.location.href='../cart.html'">
      <span>🛒 Cart</span>
      <span class="cart-badge" id="cart-count">0</span>
    </button>
  </div>
</nav>

<!-- Hero -->
<header class="nba-hero">
  <div class="container">
    <div class="hero-title">HOCKEY <span>JERSEYS</span></div>
    <p class="hero-sub">Browse the full hockey collection</p>
    <div class="hero-divider"></div>
  </div>
</header>

<!-- Main -->
<div class="container" style="max-width:1300px;">
  <!-- Filters -->
  <div class="filters-bar">
    <div class="row g-3 align-items-end">
      <div class="col-6 col-md-3">
        <label>Team</label>
        <select class="form-select" id="teamFilter">
          <option value="all">All Teams</option>
        </select>
      </div>

      <div class="col-6 col-md-3">
        <label>Type</label>
        <select class="form-select" id="typeFilter">
          <option value="all">All Types</option>
        </select>
      </div>

      <div class="col-6 col-md-3">
        <label>Sort By</label>
        <select class="form-select" id="sortFilter">
          <option value="default">Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name: A–Z</option>
          <option value="team-asc">Team: A–Z</option>
        </select>
      </div>

      <div class="col-6 col-md-3">
        <label>Search</label>
        <input type="text" class="form-control" id="searchInput" placeholder="Search product or team...">
      </div>
    </div>
  </div>

  <div class="results-count" id="resultsCount"></div>
  <div id="products-container" class="row g-4"></div>
</div>

<!-- Footer -->
<footer>
  <p>&copy; 2026 Vintage Sports Vault | All Rights Reserved</p>
</footer>

<script src="../database/data.js"></script>

<script>
let products = window.STORE_DATA?.hockey || [];

function displayProducts(items) {
  const container = document.getElementById("products-container");
  const resultsCount = document.getElementById("resultsCount");

  resultsCount.textContent = `${items.length} products found`;

  if (!Array.isArray(items) || items.length === 0) {
    container.innerHTML = `
      <div class="col-12">
        <div class="alert alert-warning">
          No hockey products found.
        </div>
      </div>
    `;
    return;
  }

  container.innerHTML = items.map(product => `
    <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
      <div class="card h-100">
        <div class="card-img-wrap">
          <img 
            class="card-img-top"
            src="${product.image || product.img || 'https://via.placeholder.com/400x300?text=No+Image'}"
            alt="${product.name || 'Hockey Product'}"
          >
        </div>

        <div class="card-body">
          <div class="team-badge">${product.team || 'Unknown Team'}</div>
          <h3 class="player-name">${product.name || 'Unnamed Product'}</h3>
          <p class="player-pos">${product.type || 'Jersey'} · ${product.era || 'Unknown Era'}</p>
          <p class="mb-2">${product.desc || ''}</p>

          <div class="d-flex justify-content-between align-items-center">
            <div class="price">$${Number(product.price || 0).toFixed(2)}</div>
            <div class="rating">${product.era || 'Vintage'}</div>
          </div>
        </div>
      </div>
    </div>
  `).join("");
}

function populateFilters() {
  const teamFilter = document.getElementById("teamFilter");
  const typeFilter = document.getElementById("typeFilter");

  const teams = [...new Set(products.map(p => p.team).filter(Boolean))].sort();
  const types = [...new Set(products.map(p => p.type).filter(Boolean))].sort();

  teams.forEach(team => {
    const option = document.createElement("option");
    option.value = team;
    option.textContent = team;
    teamFilter.appendChild(option);
  });

  types.forEach(type => {
    const option = document.createElement("option");
    option.value = type;
    option.textContent = type;
    typeFilter.appendChild(option);
  });
}

function applyFilters() {
  const team = document.getElementById("teamFilter").value;
  const type = document.getElementById("typeFilter").value;
  const sort = document.getElementById("sortFilter").value;
  const search = document.getElementById("searchInput").value.toLowerCase().trim();

  let filtered = [...products];

  if (team !== "all") {
    filtered = filtered.filter(product => product.team === team);
  }

  if (type !== "all") {
    filtered = filtered.filter(product => product.type === type);
  }

  if (search) {
    filtered = filtered.filter(product =>
      (product.name || "").toLowerCase().includes(search) ||
      (product.team || "").toLowerCase().includes(search) ||
      (product.type || "").toLowerCase().includes(search) ||
      (product.era || "").toLowerCase().includes(search)
    );
  }

  if (sort === "price-asc") {
    filtered.sort((a, b) => (a.price || 0) - (b.price || 0));
  }

  if (sort === "price-desc") {
    filtered.sort((a, b) => (b.price || 0) - (a.price || 0));
  }

  if (sort === "name-asc") {
    filtered.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
  }

  if (sort === "team-asc") {
    filtered.sort((a, b) => (a.team || "").localeCompare(b.team || ""));
  }

  displayProducts(filtered);
}

function init() {
  console.log("All hockey products loaded:", products.length);
  console.log(products);

  populateFilters();
  displayProducts(products);

  document.getElementById("teamFilter").addEventListener("change", applyFilters);
  document.getElementById("typeFilter").addEventListener("change", applyFilters);
  document.getElementById("sortFilter").addEventListener("change", applyFilters);
  document.getElementById("searchInput").addEventListener("input", applyFilters);
}

document.addEventListener("DOMContentLoaded", init);

function displayProducts(items) {
  const container = document.getElementById("products-container");
  const resultsCount = document.getElementById("resultsCount");

  resultsCount.textContent = `${items.length} products found`;

  window.currentHockeyItems = items;

  container.innerHTML = items.map((product, index) => `
    <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
      <div class="card h-100">
        <div class="card-img-wrap">
          <img 
            class="card-img-top"
            src="${product.image || product.img || 'https://via.placeholder.com/400x300?text=No+Image'}"
            alt="${product.name || 'Hockey Product'}"
          >
        </div>
        <div class="card-body">
          <div class="team-badge">${product.team || 'Unknown Team'}</div>
          <h3 class="player-name">${product.name || 'Unnamed Product'}</h3>
          <p class="player-pos">${product.type || 'Jersey'} · ${product.era || 'Unknown Era'}</p>
          <p class="mb-2">${product.desc || ''}</p>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="price">$${Number(product.price || 0).toFixed(2)}</div>
            <div class="rating">${product.era || 'Vintage'}</div>
          </div>

          <button class="btn-add-cart" onclick="addFilteredHockeyToCart(${index})">
            Add to Cart
          </button>
        </div>
      </div>
    </div>
  `).join("");
}

function addFilteredHockeyToCart(index) {
  const product = window.currentHockeyItems[index];
  addToCart(product);
}

</script>
<script src="../database/cart.js"></script>
</body>
</html>
