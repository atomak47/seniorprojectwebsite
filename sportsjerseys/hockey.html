<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hockey Jerseys | Vintage Sports Vault</title>

  <link rel="stylesheet" href="../css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a class="navbar-brand" href="../index.html">
    VINTAGE<span>SPORTS</span>
  </a>

  <div class="d-flex align-items-center gap-3" style="margin-left:auto;">
    <button id="login-btn" class="cart-btn" onclick="window.location.href='login.html'">
      <span>👤 Login</span>
    </button>

    <button class="cart-btn" onclick="window.location.href='../cart.html'">
      <span>🛒 Cart</span>
      <span class="cart-badge" id="cart-count">0</span>
    </button>
  </div>
</nav>

<!-- Hero -->
<header class="nba-hero">
  <div class="container">
    <div class="hero-title">HOCKEY <span>JERSEYS</span></div>
    <p class="hero-sub">Browse the full hockey collection</p>
    <div class="hero-divider"></div>
  </div>
</header>

<!-- Main -->
<div class="container" style="max-width:1300px;">
  <div class="filters-bar">
    <div class="row g-3 align-items-end">
      <div class="col-6 col-md-3">
        <label>Team</label>
        <select class="form-select" id="teamFilter">
          <option value="all">All Teams</option>
        </select>
      </div>

      <div class="col-6 col-md-3">
        <label>Type</label>
        <select class="form-select" id="typeFilter">
          <option value="all">All Types</option>
        </select>
      </div>

      <div class="col-6 col-md-3">
        <label>Sort By</label>
        <select class="form-select" id="sortFilter">
          <option value="default">Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name: A–Z</option>
          <option value="team-asc">Team: A–Z</option>
        </select>
      </div>

      <div class="col-6 col-md-3">
        <label>Search</label>
        <input type="text" class="form-control" id="searchInput" placeholder="Search product or team...">
      </div>
    </div>
  </div>

  <div class="results-count" id="resultsCount"></div>
  <div id="products-container" class="row g-4"></div>
</div>

<!-- Footer -->
<footer>
  <p>&copy; 2026 Vintage Sports Vault | All Rights Reserved</p>
</footer>

<script src="../database/data.js"></script>

<script>
let products = window.STORE_DATA?.hockey || [];

function populateFilters() {
  const teamFilter = document.getElementById("teamFilter");
  const typeFilter = document.getElementById("typeFilter");

  const teams = [...new Set(products.map(p => p.team).filter(Boolean))].sort();
  const types = [...new Set(products.map(p => p.type).filter(Boolean))].sort();

  teams.forEach(team => {
    const option = document.createElement("option");
    option.value = team;
    option.textContent = team;
    teamFilter.appendChild(option);
  });

  types.forEach(type => {
    const option = document.createElement("option");
    option.value = type;
    option.textContent = type;
    typeFilter.appendChild(option);
  });
}

function applyFilters() {
  const team = document.getElementById("teamFilter").value;
  const type = document.getElementById("typeFilter").value;
  const sort = document.getElementById("sortFilter").value;
  const search = document.getElementById("searchInput").value.toLowerCase().trim();

  let filtered = [...products];

  if (team !== "all") {
    filtered = filtered.filter(product => product.team === team);
  }

  if (type !== "all") {
    filtered = filtered.filter(product => product.type === type);
  }

  if (search) {
    filtered = filtered.filter(product =>
      (product.name || "").toLowerCase().includes(search) ||
      (product.team || "").toLowerCase().includes(search) ||
      (product.type || "").toLowerCase().includes(search) ||
      (product.era || "").toLowerCase().includes(search)
    );
  }

  if (sort === "price-asc") {
    filtered.sort((a, b) => (a.price || 0) - (b.price || 0));
  }

  if (sort === "price-desc") {
    filtered.sort((a, b) => (b.price || 0) - (a.price || 0));
  }

  if (sort === "name-asc") {
    filtered.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
  }

  if (sort === "team-asc") {
    filtered.sort((a, b) => (a.team || "").localeCompare(b.team || ""));
  }

  displayProducts(filtered);
}

function getSizeStock(product, size) {
  return Number(product?.sizes?.[size] ?? 0);
}

function getTotalStock(product) {
  const sizes = product?.sizes || {};
  return Number(sizes.S || 0) + Number(sizes.M || 0) + Number(sizes.L || 0) + Number(sizes.XL || 0);
}

function updateCardStock(index) {
  const product = window.currentHockeyItems[index];
  if (!product) return;

  const sizeContainer = document.getElementById(`size-${index}`);
  const stockEl = document.getElementById(`stock-text-${index}`);
  const addBtn = document.getElementById(`add-btn-${index}`);

  if (!sizeContainer || !stockEl || !addBtn) return;

  const activeSizeBtn = sizeContainer.querySelector(".size-btn.active");
  const selectedSize = activeSizeBtn ? activeSizeBtn.dataset.size : "M";

  const selectedStock = getSizeStock(product, selectedSize);
  const totalStock = getTotalStock(product);

  if (totalStock <= 0) {
    stockEl.textContent = "";
    stockEl.className = "stock-status";
    addBtn.textContent = "Unavailable";
    addBtn.disabled = true;
    return;
  }

  if (selectedStock > 0) {
    stockEl.textContent = `${selectedSize} In Stock (${selectedStock} left)`;
    stockEl.className = "stock-status in-stock";
    addBtn.textContent = "Add to Cart";
    addBtn.disabled = false;
  } else {
    stockEl.textContent = `${selectedSize} Out of Stock`;
    stockEl.className = "stock-status out-stock";
    addBtn.textContent = "Add to Cart";
    addBtn.disabled = false;
  }
}

function displayProducts(items) {
  const container = document.getElementById("products-container");
  const resultsCount = document.getElementById("resultsCount");

  if (!container) return;
  if (resultsCount) {
    resultsCount.textContent = `${items.length} products found`;
  }

  if (!Array.isArray(items) || items.length === 0) {
    container.innerHTML = `
      <div class="col-12">
        <div class="alert alert-warning">
          No hockey products found.
        </div>
      </div>
    `;
    return;
  }

  window.currentHockeyItems = items;

  container.innerHTML = items.map((product, index) => {
    const totalStock = getTotalStock(product);
    const initialSize = "M";
    const initialStock = getSizeStock(product, initialSize);

    let stockText = "";
    let stockClass = "";
    let buttonText = "";
    let buttonDisabled = "";

    if (totalStock <= 0) {
      stockText = "";
      stockClass = "";
      buttonText = "Unavailable";
      buttonDisabled = "disabled";
    } else if (initialStock > 0) {
      stockText = `${initialSize} In Stock (${initialStock} left)`;
      stockClass = "in-stock";
      buttonText = "Add to Cart";
      buttonDisabled = "";
    } else {
      stockText = `${initialSize} Out of Stock`;
      stockClass = "out-stock";
      buttonText = "Add to Cart";
      buttonDisabled = "";
    }

    return `
      <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
        <div class="card h-100">
          <div class="card-img-wrap">
            <img 
              class="card-img-top"
              src="${product.image || product.img || 'https://via.placeholder.com/400x300?text=No+Image'}"
              alt="${product.name || 'Hockey Product'}"
            >
          </div>

          <div class="card-body">
            <div class="team-badge">${product.team || 'Unknown Team'}</div>
            <h3 class="player-name">${product.name || 'Unnamed Product'}</h3>
            <p class="player-pos">${product.type || 'Jersey'} · ${product.era || 'Unknown Era'}</p>
            <p class="mb-2">${product.desc || product.description || ''}</p>

            <div class="d-flex justify-content-between align-items-center mb-2">
              <div class="price">$${Number(product.price || 0).toFixed(2)}</div>
              <div class="rating">${product.era || 'Vintage'}</div>
            </div>

            <p id="stock-text-${index}" class="stock-status ${stockClass}">
              ${stockText}
            </p>

            <div class="size-buttons mb-2" id="size-${index}">
              <button type="button" class="size-btn" data-size="S" onclick="selectSize(this, ${index})">S</button>
              <button type="button" class="size-btn active" data-size="M" onclick="selectSize(this, ${index})">M</button>
              <button type="button" class="size-btn" data-size="L" onclick="selectSize(this, ${index})">L</button>
              <button type="button" class="size-btn" data-size="XL" onclick="selectSize(this, ${index})">XL</button>
            </div>

            <button id="add-btn-${index}" class="btn-add-cart" onclick="addFilteredHockeyToCart(${index})" ${buttonDisabled}>
              ${buttonText}
            </button>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function addFilteredHockeyToCart(index) {
  const product = window.currentHockeyItems[index];
  if (!product) return;

  const sizeContainer = document.getElementById(`size-${index}`);
  const activeSizeBtn = sizeContainer ? sizeContainer.querySelector(".size-btn.active") : null;
  const size = activeSizeBtn ? activeSizeBtn.dataset.size : "M";

  const selectedStock = getSizeStock(product, size);
  const totalStock = getTotalStock(product);

  if (totalStock <= 0) {
    showToast("This item is unavailable");
    return;
  }

  if (selectedStock <= 0) {
    showToast(`${size} is out of stock`);
    updateCardStock(index);
    return;
  }

  addToCart({
    ...product,
    size
  });
}

function selectSize(button, index) {
  const container = button.parentElement;
  container.querySelectorAll(".size-btn").forEach(btn => btn.classList.remove("active"));
  button.classList.add("active");
  updateCardStock(index);
}

function init() {
  console.log("All hockey products loaded:", products.length);
  console.log(products);

  populateFilters();
  displayProducts(products);

  document.getElementById("teamFilter").addEventListener("change", applyFilters);
  document.getElementById("typeFilter").addEventListener("change", applyFilters);
  document.getElementById("sortFilter").addEventListener("change", applyFilters);
  document.getElementById("searchInput").addEventListener("input", applyFilters);
}

document.addEventListener("DOMContentLoaded", init);
</script>

<script src="../database/cart.js"></script>
</body>
</html>
