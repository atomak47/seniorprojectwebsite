<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vintage Soccer Jerseys</title>

<link rel="stylesheet" href="../css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar d-flex align-items-center justify-content-between">

<a class="navbar-brand" href="../index.html">
VINTAGE<span>SPORTS</span>
</a>

<button class="cart-btn" onclick="toggleCart()">
🛒 Cart
<span id="cart-count">0</span>
</button>

</nav>


<!-- PAGE TITLE -->

<section class="container mt-5">

<h1 class="page-title text-center mb-4">
Vintage Soccer Jerseys
</h1>

<div id="product-grid" class="row g-4"></div>

</section>


<!-- DATA -->

<script src="../data/data.js"></script>


<!-- PAGE SCRIPT -->

<script>

const grid = document.getElementById("product-grid")

function loadSoccerProducts(){

let soccerProducts = window.PRODUCTS.filter(
p => p.sport === "soccer"
)

soccerProducts.forEach(product => {

let card = document.createElement("div")

card.className = "col-md-3"

card.innerHTML = `

<div class="product-card">

<h5>${product.name}</h5>

<p class="team">${product.team}</p>

<p class="era">${product.era}</p>

<p class="price">$${product.price}</p>

<button class="add-btn"
onclick="addToCart('${product.id}')">
Add To Cart
</button>

</div>

`

grid.appendChild(card)

})

}

loadSoccerProducts()

</script>


<!-- CART SCRIPT -->

<script src="../js/cart.js"></script>

</body>
</html>
