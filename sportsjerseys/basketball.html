<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greatest NBA Jerseys of All Time — EliteSports</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a class="navbar-brand" href="../index.html">
    VINTAGE<span>SPORTS</span>
  </a>

  <div class="d-flex align-items-center gap-3" style="margin-left:auto;">
    <button id="login-btn" class="cart-btn"></button>

    <button class="cart-btn" onclick="window.location.href='../cart.html'">
      <span>🛒 Cart</span>
      <span class="cart-badge" id="cart-count">0</span>
    </button>
  </div>
</nav>

<!-- Hero -->
<header class="nba-hero">
    <div class="container">
        <div class="hero-title">TOP 30 <span>NBA</span> LEGENDS</div>
        <p class="hero-sub">AUTHENTIC JERSEYS · THE 30 GREATEST PLAYERS IN NBA HISTORY</p>
        <div class="hero-divider"></div>
    </div>
</header>

<!-- Main -->
<div class="container" style="max-width:1300px;">
    <div class="filters-bar">
        <div class="row g-3 align-items-end">
            <div class="col-6 col-md-3">
                <label>Team</label>
                <select class="form-select" id="teamFilter">
                    <option value="all">All Teams</option>
                </select>
            </div>
            <div class="col-6 col-md-3">
                <label>Position</label>
                <select class="form-select" id="posFilter">
                    <option value="all">All Positions</option>
                    <option value="PG">PG</option>
                    <option value="SG">SG</option>
                    <option value="SF">SF</option>
                    <option value="PF">PF</option>
                    <option value="C">C</option>
                </select>
            </div>
            <div class="col-6 col-md-3">
                <label>Sort By</label>
                <select class="form-select" id="sortFilter">
                    <option value="default">Featured</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="name-asc">Name: A–Z</option>
                    <option value="rating-desc">Highest Rated</option>
                </select>
            </div>
            <div class="col-6 col-md-3">
                <label>Search</label>
                <input type="text" class="form-control" id="searchInput" placeholder="Player name...">
            </div>
        </div>
    </div>

    <div class="results-count" id="resultsCount"></div>
    <div id="player-grid" class="row g-4"></div>
</div>

<!-- Footer -->
<footer>© 2026 EliteSports — NBA Jersey Shop · Senior Project Portfolio</footer>

<!-- Cart Overlay -->
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

<!-- Cart Sidebar -->
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <h5>🛒 Your Cart</h5>
        <button class="btn-close-cart" onclick="toggleCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItemsList">
        <div class="cart-empty">
            <div class="empty-icon">🏀</div>
            <p>Your cart is empty.<br>Add some jerseys!</p>
        </div>
    </div>
    <div class="cart-footer">
        <div class="cart-subtotal">
            <span>Subtotal</span>
            <span class="amount" id="cartTotal">$0.00</span>
        </div>
        <button class="btn-checkout" onclick="checkout()">Proceed to Checkout →</button>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
let players = [];

function populateTeams() {
    const teamFilter = document.getElementById("teamFilter");
    teamFilter.innerHTML = `<option value="all">All Teams</option>`;

    const teams = [...new Set(players.map(p => p.team).filter(Boolean))].sort();

    teams.forEach(team => {
        const option = document.createElement("option");
        option.value = team;
        option.textContent = team;
        teamFilter.appendChild(option);
    });
}

function applyFilters() {
    const team = document.getElementById("teamFilter").value;
    const pos = document.getElementById("posFilter").value;
    const sort = document.getElementById("sortFilter").value;
    const search = document.getElementById("searchInput").value.toLowerCase().trim();

    let filtered = [...players];

    if (team !== "all") {
        filtered = filtered.filter(p => p.team === team);
    }

    if (pos !== "all") {
        filtered = filtered.filter(p => p.pos === pos);
    }

    if (search) {
        filtered = filtered.filter(p =>
            (p.name || "").toLowerCase().includes(search) ||
            (p.team || "").toLowerCase().includes(search)
        );
    }

    if (sort === "price-asc") {
        filtered.sort((a, b) => Number(a.price || 0) - Number(b.price || 0));
    }

    if (sort === "price-desc") {
        filtered.sort((a, b) => Number(b.price || 0) - Number(a.price || 0));
    }

    if (sort === "name-asc") {
        filtered.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
    }

    if (sort === "rating-desc") {
        filtered.sort((a, b) => Number(b.rating || 0) - Number(a.rating || 0));
    }

    displayPlayers(filtered);
}

function getSizeStock(player, size) {
    return Number(player?.sizes?.[size] ?? 0);
}

function getTotalStock(player) {
    const sizes = player?.sizes || {};
    return Number(sizes.S || 0) + Number(sizes.M || 0) + Number(sizes.L || 0) + Number(sizes.XL || 0);
}

function updateCardStock(index) {
    const player = window.currentBasketballItems[index];
    if (!player) return;

    const sizeContainer = document.getElementById(`size-${index}`);
    const stockEl = document.getElementById(`stock-text-${index}`);
    const addBtn = document.getElementById(`add-btn-${index}`);

    if (!sizeContainer || !stockEl || !addBtn) return;

    const activeSizeBtn = sizeContainer.querySelector(".size-btn.active");
    const selectedSize = activeSizeBtn ? activeSizeBtn.dataset.size : "M";

    const selectedStock = getSizeStock(player, selectedSize);
    const totalStock = getTotalStock(player);

    if (totalStock <= 0) {
        stockEl.textContent = "";
        stockEl.className = "stock-status";
        addBtn.textContent = "Unavailable";
        addBtn.disabled = true;
        return;
    }

    if (selectedStock > 0) {
        stockEl.textContent = `${selectedSize} In Stock (${selectedStock} left)`;
        stockEl.className = "stock-status in-stock";
        addBtn.textContent = "Add to Cart";
        addBtn.disabled = false;
    } else {
        stockEl.textContent = `${selectedSize} Out of Stock`;
        stockEl.className = "stock-status out-stock";
        addBtn.textContent = "Add to Cart";
        addBtn.disabled = false;
    }
}

function displayPlayers(items) {
    const grid = document.getElementById("player-grid");
    const resultsCount = document.getElementById("resultsCount");

    resultsCount.textContent = `${items.length} products found`;
    window.currentBasketballItems = items;

    grid.innerHTML = items.map((player, index) => {
        const totalStock = getTotalStock(player);
        const initialSize = "M";
        const initialStock = getSizeStock(player, initialSize);

        let stockText = "";
        let stockClass = "";
        let buttonText = "";
        let buttonDisabled = "";

        if (totalStock <= 0) {
            stockText = "";
            stockClass = "";
            buttonText = "Unavailable";
            buttonDisabled = "disabled";
        } else if (initialStock > 0) {
            stockText = `${initialSize} In Stock (${initialStock} left)`;
            stockClass = "in-stock";
            buttonText = "Add to Cart";
            buttonDisabled = "";
        } else {
            stockText = `${initialSize} Out of Stock`;
            stockClass = "out-stock";
            buttonText = "Add to Cart";
            buttonDisabled = "";
        }

        return `
          <div class="col-12 col-sm-6 col-lg-4 col-xl-3">
            <div class="card h-100">
              <div class="card-img-wrap">
                <img class="card-img-top"
                  src="${player.image || player.img || 'https://via.placeholder.com/400x300?text=No+Image'}"
                  alt="${player.name || 'NBA Product'}">
              </div>

              <div class="card-body">
                <div class="team-badge">${player.team || 'Unknown Team'}</div>

                <h3 class="player-name">${player.name || 'Unnamed Product'}</h3>

                <p class="player-pos">${player.pos || player.type || 'NBA'}${player.number ? ` · #${player.number}` : ''}</p>

                <div class="d-flex justify-content-between align-items-center mb-2">
                  <div class="price">$${Number(player.price || 0).toFixed(2)}</div>
                  <div class="rating">★ ${Number(player.rating || 0).toFixed(1)}</div>
                </div>

                <p id="stock-text-${index}" class="stock-status ${stockClass}">
                  ${stockText}
                </p>

                <div class="size-buttons mb-2" id="size-${index}">
                  <button type="button" class="size-btn" data-size="S" onclick="selectSize(this, ${index})">S</button>
                  <button type="button" class="size-btn active" data-size="M" onclick="selectSize(this, ${index})">M</button>
                  <button type="button" class="size-btn" data-size="L" onclick="selectSize(this, ${index})">L</button>
                  <button type="button" class="size-btn" data-size="XL" onclick="selectSize(this, ${index})">XL</button>
                </div>

                <button id="add-btn-${index}" class="btn-add-cart"
                  onclick="addFilteredBasketballToCart(${index})"
                  ${buttonDisabled}>
                  ${buttonText}
                </button>
              </div>
            </div>
          </div>
        `;
    }).join("");
}

function addFilteredBasketballToCart(index) {
    const product = window.currentBasketballItems[index];
    if (!product) return;

    const sizeContainer = document.getElementById(`size-${index}`);
    const activeSizeBtn = sizeContainer ? sizeContainer.querySelector(".size-btn.active") : null;
    const size = activeSizeBtn ? activeSizeBtn.dataset.size : "M";

    const selectedStock = getSizeStock(product, size);
    const totalStock = getTotalStock(product);

    if (totalStock <= 0) {
        showToast("This item is unavailable");
        return;
    }

    if (selectedStock <= 0) {
        showToast(`${size} is out of stock`);
        updateCardStock(index);
        return;
    }

    const item = {
        ...product,
        id: product._id || product.id,
        size: size,
        quantity: 1
    };

    addToCart(item);
}

function selectSize(button, index) {
    const container = button.parentElement;
    container.querySelectorAll(".size-btn").forEach(btn => btn.classList.remove("active"));
    button.classList.add("active");
    updateCardStock(index);
}

function updateAuthButton() {
    const btn = document.getElementById("login-btn");
    if (!btn) return;

    const user = localStorage.getItem("vsv_current_user");

    if (user) {
        const parsedUser = JSON.parse(user);
        const displayName = parsedUser.username || parsedUser.email || "Account";

        btn.innerHTML = `<span>👤 ${displayName} | Sign Out</span>`;
        btn.onclick = function () {
            localStorage.removeItem("vsv_current_user");
            window.location.href = "../index.html";
        };
    } else {
        btn.innerHTML = "<span>👤 Login</span>";
        btn.onclick = function () {
            window.location.href = "../login.html";
        };
    }
}

async function loadPlayers() {
    try {
        const res = await fetch("/api/products/category/NBA");
        const data = await res.json();

        if (!res.ok || !data.success) {
            throw new Error(data.message || "Failed to load NBA products.");
        }

        players = data.products || [];
        populateTeams();
        displayPlayers(players);
    } catch (error) {
        console.error("NBA load error:", error);
        if (typeof showToast === "function") {
            showToast("Failed to load NBA products");
        }
    }
}

function init() {
    updateAuthButton();
    loadPlayers();

    document.getElementById("teamFilter").addEventListener("change", applyFilters);
    document.getElementById("posFilter").addEventListener("change", applyFilters);
    document.getElementById("sortFilter").addEventListener("change", applyFilters);
    document.getElementById("searchInput").addEventListener("input", applyFilters);
}

init();
</script>

<script src="../database/cart.js"></script>
</body>
</html>
