<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders | Vintage Sports Vault</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<script>
  const currentUser = JSON.parse(localStorage.getItem("vsv_current_user"));

  if (!currentUser) {
    window.location.href = "login.html";
  }

  function goHomeByRole() {
    if (currentUser && currentUser.role === "admin") {
      window.location.href = "admin/admin_dashboard.html";
    } else {
      window.location.href = "index.html";
    }
  }
</script>

<nav class="navbar">
  <a class="navbar-brand" href="javascript:void(0)" onclick="goHomeByRole()">VINTAGE<span>SPORTS</span></a>
  <div class="nav-actions d-flex gap-2">
    <a href="javascript:void(0)" onclick="goHomeByRole()" class="cart-btn text-decoration-none d-inline-flex align-items-center">Home</a>
    <button id="logout-btn" class="cart-btn" type="button">Logout</button>
  </div>
</nav>

<header class="nba-hero">
  <div class="container text-center">
    <div class="hero-title">ORDER <span>TRACKING</span></div>
    <p class="hero-sub">Check your current delivery status</p>
    <div class="hero-divider"></div>
  </div>
</header>

<main class="container" style="margin-top: 40px; margin-bottom: 70px;">
  <div class="admin-section-card">
    <div class="admin-section-header">
      <h2 class="admin-section-title">User Orders</h2>
      <button id="refresh-orders-btn" class="btn-add-cart" type="button">Refresh</button>
    </div>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Date</th>
            <th>Total</th>
            <th>Items</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="user-orders-table"></tbody>
      </table>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2026 Vintage Sports Vault</p>
</footer>

<script>
  let userOrders = [];

  function formatDate(dateString) {
    if (!dateString) return "N/A";
    return new Date(dateString).toLocaleString();
  }

  function getOrderItemsText(order) {
    if (!Array.isArray(order.cart)) return "No items";
    return order.cart.map(item => {
      const qty = Number(item.quantity || 1);
      const size = item.size || "N/A";
      return `${item.name} (${size}) x${qty}`;
    }).join("<br>");
  }

  async function fetchUserOrders() {
    const email = currentUser?.email;
    if (!email) {
      alert("No user email found.");
      return;
    }

    try {
      const res = await fetch(`/api/orders/user/${encodeURIComponent(email)}`);
      const data = await res.json();

      if (!res.ok || !data.success) {
        alert(data.message || "Failed to load your orders.");
        return;
      }

      userOrders = data.orders || [];
      renderOrders();
    } catch (error) {
      console.error("Orders fetch error:", error);
      alert("Failed to load your orders.");
    }
  }

  function renderOrders() {
    const tbody = document.getElementById("user-orders-table");

    if (!userOrders.length) {
      tbody.innerHTML = `
        <tr>
          <td colspan="5" class="admin-empty-state">Incoming orders will show up here.</td>
        </tr>
      `;
      return;
    }

    tbody.innerHTML = userOrders.map(order => `
      <tr>
        <td>${order._id}</td>
        <td>${formatDate(order.createdAt)}</td>
        <td>$${Number(order.total || 0).toFixed(2)}</td>
        <td style="font-size:12px;">${getOrderItemsText(order)}</td>
        <td><span class="admin-stock-badge">${order.status || "Pending"}</span></td>
      </tr>
    `).join("");
  }

  document.getElementById("refresh-orders-btn").addEventListener("click", fetchUserOrders);

  document.getElementById("logout-btn").addEventListener("click", function () {
    localStorage.removeItem("vsv_current_user");
    window.location.href = "login.html";
  });

  fetchUserOrders();
</script>

</body>
</html>
