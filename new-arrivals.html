<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Arrivals | Vintage Sports Vault</title>

  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .new-arrivals-hero {
      background:
        linear-gradient(rgba(13,13,15,0.72), rgba(13,13,15,0.88)),
        url('https://images.unsplash.com/photo-1511886929837-354d827aae26?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
      padding: 90px 20px 70px;
      text-align: center;
      border-bottom: 1px solid var(--card-border);
    }

    .new-arrivals-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      letter-spacing: 2px;
      line-height: 1;
      margin-bottom: 12px;
      color: #fff;
    }

    .new-arrivals-title span {
      color: var(--nba-red);
    }

    .new-arrivals-sub {
      color: var(--text-muted);
      max-width: 720px;
      margin: 0 auto 20px;
      font-size: 1.05rem;
    }

    .hero-divider {
      width: 90px;
      height: 4px;
      background: linear-gradient(90deg, var(--nba-blue), var(--nba-red));
      margin: 0 auto;
      border-radius: 999px;
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 35px 0 10px;
    }

    .filter-btn {
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      color: var(--text-main);
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: 600;
      transition: 0.25s ease;
      cursor: pointer;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--nba-red);
      border-color: var(--nba-red);
      color: #fff;
    }

    .section-heading {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1px;
      font-size: 2rem;
      margin-bottom: 6px;
    }

    .section-subtext {
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .arrival-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      overflow: hidden;
      height: 100%;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .arrival-card:hover {
      transform: translateY(-6px);
      border-color: rgba(255,255,255,0.16);
      box-shadow: 0 16px 34px rgba(0,0,0,0.26);
    }

    .arrival-image-wrap {
      width: 100%;
      height: 300px;
      background: #111;
      overflow: hidden;
    }

    .arrival-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .arrival-body {
      padding: 18px;
    }

    .arrival-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 8px;
    }

    .arrival-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--text-main);
    }

    .arrival-team {
      font-size: 0.92rem;
      color: var(--text-muted);
      margin-bottom: 0;
    }

    .arrival-price {
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      white-space: nowrap;
    }

    .arrival-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 14px;
    }

    .arrival-badge {
      font-size: 0.78rem;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge-nba {
      background: rgba(23,64,139,0.18);
      color: #8fb3ff;
      border: 1px solid rgba(23,64,139,0.4);
    }

    .badge-hockey {
      background: rgba(180,180,180,0.12);
      color: #d7d7d7;
      border: 1px solid rgba(220,220,220,0.22);
    }

    .badge-soccer {
      background: rgba(24,150,80,0.14);
      color: #8ce0a8;
      border: 1px solid rgba(24,150,80,0.35);
    }

    .badge-type {
      background: rgba(255,255,255,0.06);
      color: var(--text-main);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .arrival-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 14px;
      min-height: 44px;
    }

    .arrival-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .arrival-btn {
      flex: 1;
      min-width: 130px;
      text-align: center;
      text-decoration: none;
    }

    .empty-state {
      text-align: center;
      padding: 50px 20px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      color: var(--text-muted);
    }

    .new-tag {
      display: inline-block;
      margin-bottom: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(201,8,42,0.14);
      border: 1px solid rgba(201,8,42,0.35);
      color: #ff8ea3;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.4px;
    }
  </style>
</head>
<body>

  <script>
    try {
      const user = JSON.parse(localStorage.getItem("vsv_current_user"));
      if (user && user.role === "admin") {
        window.location.href = "/admin/admin_dashboard.html";
      }
    } catch (e) {}
  </script>

  <nav class="navbar">
    <a class="navbar-brand" href="#">VINTAGE<span>SPORTS</span></a>

    <div class="d-flex align-items-center gap-3" style="margin-left:auto;">
      <a href="cart.html" class="cart-btn text-decoration-none d-inline-flex align-items-center">Cart</a>
      <a href="login.html" id="login-btn" class="cart-btn text-decoration-none d-inline-flex align-items-center">Login</a>
    </div>
  </nav>

  <header class="new-arrivals-hero">
    <div class="container">
      <div class="new-arrivals-title">NEW <span>ARRIVALS</span></div>
      <div class="hero-divider"></div>
    </div>
  </header>

  <main class="container" style="margin-top: 45px; margin-bottom: 70px;">
    <div class="text-center mb-4">
      <h2 class="section-heading">Latest Products</h2>
      <p class="section-subtext">Browse the newest additions from all three sports categories.</p>

      <div class="filter-bar">
        <button class="filter-btn active" data-filter="All">All</button>
        <button class="filter-btn" data-filter="NBA">NBA</button>
        <button class="filter-btn" data-filter="Hockey">Hockey</button>
        <button class="filter-btn" data-filter="Soccer">Soccer</button>
      </div>
    </div>

    <div id="products-row" class="row g-4"></div>
  </main>

  <footer>
    <p>&copy; 2026 Vintage Sports Vault</p>
  </footer>

  <script>
    const API_BASE = "http://localhost:3000";
    let allProducts = [];
    let currentFilter = "All";

    function getHomePage() {
      try {
        const user = JSON.parse(localStorage.getItem("vsv_current_user"));
        if (user && user.role === "admin") {
          return "/admin/admin_dashboard.html";
        }
      } catch (e) {}
      return "/index.html";
    }

    function setupNavbar() {
      const brand = document.querySelector(".navbar-brand");
      if (brand) {
        brand.href = getHomePage();
      }

      const currentUser = JSON.parse(localStorage.getItem("vsv_current_user"));
      const loginBtn = document.getElementById("login-btn");

      if (currentUser && loginBtn) {
        loginBtn.textContent = "Account";
        loginBtn.href = "orders.html";
      }
    }

    function escapeHtml(str = "") {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getCategoryBadgeClass(category) {
      if (category === "NBA") return "badge-nba";
      if (category === "Hockey") return "badge-hockey";
      if (category === "Soccer") return "badge-soccer";
      return "badge-type";
    }

    function getCategoryLink(category) {
      if (category === "NBA") return "nba.html";
      if (category === "Hockey") return "hockey.html";
      if (category === "Soccer") return "soccer.html";
      return "index.html";
    }

    function sortNewestFirst(products) {
      return [...products].sort((a, b) => {
        const dateA = new Date(a.createdAt || 0).getTime();
        const dateB = new Date(b.createdAt || 0).getTime();
        return dateB - dateA;
      });
    }

    function renderProducts() {
      const row = document.getElementById("products-row");

      let filtered = [...allProducts];
      if (currentFilter !== "All") {
        filtered = filtered.filter(p => p.category === currentFilter);
      }

      filtered = sortNewestFirst(filtered);

      if (!filtered.length) {
        row.innerHTML = `
          <div class="col-12">
            <div class="empty-state">
              No new arrivals found in this category yet.
            </div>
          </div>
        `;
        return;
      }

      row.innerHTML = filtered.map((product, index) => {
        const image = product.image && product.image.trim()
          ? product.image
          : "https://via.placeholder.com/600x700?text=Vintage+Sports+Vault";

        const description = product.description && product.description.trim()
          ? product.description
          : "Classic vintage piece freshly added to the collection.";

        const showNewTag = index < 8;

        return `
          <div class="col-sm-6 col-lg-4">
            <div class="arrival-card">
              <div class="arrival-image-wrap">
                <img
                  src="${escapeHtml(image)}"
                  alt="${escapeHtml(product.name || "Product")}"
                  class="arrival-image"
                >
              </div>

              <div class="arrival-body">
                ${showNewTag ? `<span class="new-tag">Just Added</span>` : ""}

                <div class="arrival-top">
                  <div>
                    <div class="arrival-name">${escapeHtml(product.name || "Unnamed Product")}</div>
                    <p class="arrival-team">${escapeHtml(product.team || "Vintage Sports Vault")}</p>
                  </div>
                  <div class="arrival-price">$${Number(product.price || 0).toFixed(2)}</div>
                </div>

                <div class="arrival-meta">
                  <span class="arrival-badge ${getCategoryBadgeClass(product.category)}">
                    ${escapeHtml(product.category || "Item")}
                  </span>
                  <span class="arrival-badge badge-type">
                    ${escapeHtml(product.type || "Vintage")}
                  </span>
                </div>

                <div class="arrival-desc">
                  ${escapeHtml(description).slice(0, 110)}${description.length > 110 ? "..." : ""}
                </div>

                <div class="arrival-actions">
                  <a href="${getCategoryLink(product.category)}" class="btn-add-cart arrival-btn">
                    Shop ${escapeHtml(product.category || "")}
                  </a>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    async function fetchProducts() {
      try {
        const res = await fetch(`${API_BASE}/api/products`);
        const text = await res.text();

        let data;
        try {
          data = JSON.parse(text);
        } catch (err) {
          throw new Error(`Products route returned non-JSON. Status: ${res.status}`);
        }

        if (!res.ok || !data.success) {
          throw new Error(data.message || "Failed to load products.");
        }

        allProducts = Array.isArray(data.products)
        ? data.products
            .sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0))
            .slice(0, 30)
        : [];
        renderProducts();
      } catch (error) {
        console.error("New arrivals error:", error);
        document.getElementById("products-row").innerHTML = `
          <div class="col-12">
            <div class="empty-state">
              Failed to load new arrivals: ${error.message}
            </div>
          </div>
        `;
      }
    }

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", function () {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        this.classList.add("active");
        currentFilter = this.dataset.filter;
        renderProducts();
      });
    });

    setupNavbar();
    fetchProducts();
  </script>
</body>
</html>
