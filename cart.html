<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Cart | Vintage Sports Vault</title>

  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="index.html">
    VINTAGE<span>SPORTS</span>
  </a>

  <div class="d-flex align-items-center gap-3" style="margin-left:auto;">
    <button class="cart-btn" onclick="window.location.href='index.html'">
      <span>← Continue Shopping</span>
    </button>

    <button class="cart-btn">
      <span>🛒 Cart</span>
      <span class="cart-badge" id="cart-count">0</span>
    </button>
  </div>
</nav>

<header class="nba-hero">
  <div class="container">
    <div class="hero-title">YOUR <span>CART</span></div>
    <div class="hero-divider"></div>
  </div>
</header>

<main class="container" style="max-width:1200px; margin-top:40px; margin-bottom:60px;">
  <div id="cart-empty" class="text-center" style="padding:60px 20px;">
    <h2>Your cart is empty</h2>
    <p style="color: var(--text-muted); margin-top:10px;">Add some jerseys to get started.</p>
    <button class="btn-add-cart" style="max-width:240px; margin-top:20px;" onclick="window.location.href='index.html'">
      Shop Now
    </button>
  </div>

  <div class="row g-4">
    <div class="col-lg-8">
      <div id="cart-items-container"></div>
    </div>

    <div class="col-lg-4">
      <div class="filters-bar">
        <h3 style="margin-bottom:20px;">Order Summary</h3>

        <div class="d-flex justify-content-between mb-2">
          <span>Subtotal</span>
          <span id="cart-subtotal">$0.00</span>
        </div>

        <div class="d-flex justify-content-between mb-2">
          <span>Shipping</span>
          <span>Free</span>
        </div>

        <hr style="border-color: var(--card-border);">

        <div class="d-flex justify-content-between mb-3">
          <strong>Total</strong>
          <strong id="cart-total">$0.00</strong>
        </div>

        <button id="checkout-btn" type="button" class="btn-add-cart mb-3">
          Proceed to Checkout
        </button>

        <button id="clear-cart-btn" type="button" class="cart-btn w-100 justify-content-center">
          Clear Cart
        </button>
      </div>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2026 Vintage Sports Vault | All Rights Reserved</p>
</footer>

<div class="toast-container" id="toastContainer"></div>

<script src="database/cart.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    updateCartCount();
    renderCartPage();
  });
</script>
</body>
</html>
