<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Vintage Sports Vault</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="index.html">VINTAGE<span>SPORTS</span></a>
</nav>

<header class="nba-hero">
  <div class="container">
    <div class="hero-title">CHECK<span>OUT</span></div>
    <p class="hero-sub">Complete your purchase</p>
    <div class="hero-divider"></div>
  </div>
</header>

<main class="container" style="max-width:800px; margin-top:40px; margin-bottom:60px;">
  <div class="filters-bar">
    <form id="checkout-form">
      <div class="mb-3">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="email">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="address">Shipping Address</label>
        <input type="text" id="address" class="form-control" required>
      </div>

      <div class="mb-3">
        <label for="cardNumber">Card Number</label>
        <input
          type="text"
          id="cardNumber"
          class="form-control"
          inputmode="numeric"
          autocomplete="cc-number"
          maxlength="19"
          placeholder="1234 5678 9012 3456"
          required
        >
      </div>

      <div class="mb-3">
        <label>Order Total</label>
        <input type="text" id="orderTotal" class="form-control" readonly>
      </div>

      <button type="submit" class="btn-add-cart">Place Order</button>
    </form>
  </div>
</main>

<footer>
  <p>&copy; 2026 Vintage Sports Vault | All Rights Reserved</p>
</footer>

<script>
  function getCart() {
    return JSON.parse(localStorage.getItem("vsv_cart")) || [];
  }

  function getCurrentUser() {
    return JSON.parse(localStorage.getItem("vsv_current_user") || "null");
  }

  function getCartTotal() {
    return getCart().reduce((sum, item) => {
      return sum + Number(item.price || 0) * Number(item.quantity || 1);
    }, 0);
  }

  function formatCardNumber(value) {
    return value
      .replace(/\D/g, "")
      .slice(0, 16)
      .replace(/(.{4})/g, "$1 ")
      .trim();
  }

  function loadCheckoutInfo() {
    const cart = getCart();
    const currentUser = getCurrentUser();

    if (!currentUser) {
      alert("Please log in before checkout.");
      window.location.href = "login.html";
      return;
    }

    if (!cart.length) {
      alert("Your cart is empty.");
      window.location.href = "cart.html";
      return;
    }

    document.getElementById("orderTotal").value = `$${getCartTotal().toFixed(2)}`;

    if (currentUser.username) {
      document.getElementById("fullName").value = currentUser.username;
    }

    if (currentUser.email) {
      document.getElementById("email").value = currentUser.email;
    }
  }

  document.getElementById("cardNumber").addEventListener("input", function () {
    this.value = formatCardNumber(this.value);
  });

  document.getElementById("checkout-form").addEventListener("submit", async function (event) {
    event.preventDefault();

    const cart = getCart();
    const currentUser = getCurrentUser();

    if (!currentUser) {
      alert("Please log in before checkout.");
      window.location.href = "login.html";
      return;
    }

    if (!cart.length) {
      alert("Your cart is empty.");
      return;
    }

    const cardNumber = document.getElementById("cardNumber").value.replace(/\s/g, "");

    if (cardNumber.length < 13 || cardNumber.length > 16) {
      alert("Please enter a valid card number.");
      return;
    }

    const payload = {
      name: document.getElementById("fullName").value.trim(),
      email: document.getElementById("email").value.trim(),
      address: document.getElementById("address").value.trim(),
      cart: cart.map(item => ({
        id: item.id || item._id || "",
        name: item.name || "Unnamed Product",
        price: Number(item.price || 0),
        quantity: Number(item.quantity || 1),
        size: item.size || "M"
      })),
      total: getCartTotal()
    };

    try {
      const response = await fetch("/api/checkout", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (!response.ok || !result.success) {
        throw new Error(result.message || "Checkout failed");
      }

      localStorage.setItem("vsv_order_number", result.orderNumber || "");
      localStorage.setItem("vsv_order_email", payload.email);
      localStorage.setItem("vsv_order_name", payload.name);
      localStorage.removeItem("vsv_cart");

      window.location.href = "order_confirmation.html";
    } catch (error) {
      console.error("Checkout error:", error);
      alert("Order failed: " + error.message);
    }
  });

  loadCheckoutInfo();
</script>

</body>
</html>
